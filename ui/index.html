<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-app-region: no-drag;
    }

    header {
      background: #16213e;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
      -webkit-app-region: drag;
      min-height: 32px;
    }

    header h1 { font-size: 1.1rem; color: #00d9ff; letter-spacing: 0.15em; }

    .header-btns {
      display: flex;
      gap: 0.5rem;
      -webkit-app-region: no-drag;
    }

    .hdr-btn {
      background: none;
      border: 1px solid #00d9ff44;
      color: #00d9ff;
      padding: 0.25rem 0.6rem;
      border-radius: 0.75rem;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all 0.15s;
    }
    .hdr-btn:hover { background: #00d9ff22; border-color: #00d9ff; }
    .hdr-btn.off { border-color: #444; color: #555; }

    /* Status dot */
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      display: inline-block;
      margin-right: 0.4rem;
      transition: background 0.3s;
    }
    #status-dot.online  { background: #00ff99; }
    #status-dot.offline { background: #ff4444; }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .msg {
      max-width: 82%;
      padding: 0.65rem 0.9rem;
      border-radius: 1rem;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 0.92rem;
    }
    .msg.user      { align-self: flex-end; background: #0f3460; border-bottom-right-radius: 0.2rem; }
    .msg.assistant { align-self: flex-start; background: #1f4068; border-bottom-left-radius: 0.2rem; }
    .msg.error     { background: #5c1a1a; color: #ff6b6b; }

    .typing { display: flex; gap: 5px; padding: 0.65rem 0.9rem; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #00d9ff;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

    /* Input bar */
    #input-bar {
      padding: 0.75rem 1rem;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 0.5rem;
    }

    #msg-input {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1px solid #0f3460;
      border-radius: 1.5rem;
      background: #1a1a2e;
      color: #eee;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #00d9ff; }
    #msg-input::placeholder { color: #555; }
    #msg-input:disabled { opacity: 0.5; }

    #send-btn {
      padding: 0.65rem 1.25rem;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 1.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #00b8d9; }
    #send-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

    /* Settings overlay */
    #settings {
      display: none;
      position: fixed; inset: 0;
      background: #1a1a2eee;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #settings.open { display: flex; }

    .settings-box {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 1rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 360px;
    }
    .settings-box h2 { color: #00d9ff; margin-bottom: 1rem; font-size: 1rem; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 0.35rem; }
    .field input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 0.5rem;
      color: #eee;
      font-size: 0.9rem;
      outline: none;
    }
    .field input:focus { border-color: #00d9ff; }

    .settings-btns { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-save {
      padding: 0.5rem 1.2rem;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 0.5rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-cancel {
      padding: 0.5rem 1rem;
      background: none;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 0.5rem;
      cursor: pointer;
    }

    #user-badge {
      color: #00d9ff99;
      font-size: 0.78rem;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #logout-btn {
      display: none;
      border-color: #ff6b6b55;
      color: #ff6b6b;
    }
    #logout-btn:hover { background: #ff6b6b22; border-color: #ff6b6b; }

    #login {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2eee;
      z-index: 150;
      align-items: center;
      justify-content: center;
    }
    #login.open { display: flex; }
    .login-box {
      width: 90%;
      max-width: 360px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 1rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .login-box h2 { color: #00d9ff; font-size: 1rem; }
    .login-box p { color: #9fb7d1; font-size: 0.85rem; }
    .login-box input {
      width: 100%;
      padding: 0.65rem 0.8rem;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 0.5rem;
      color: #eee;
      font-size: 0.9rem;
      outline: none;
    }
    .login-box input:focus { border-color: #00d9ff; }
    #login-btn {
      padding: 0.6rem 1rem;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    #login-btn:disabled { background: #333; color: #555; cursor: not-allowed; }
    #login-error {
      color: #ff6b6b;
      display: none;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

<header>
  <h1><span id="status-dot"></span>AION</h1>
  <div class="header-btns">
    <span id="user-badge"></span>
    <button class="hdr-btn" id="tts-btn">TTS ON</button>
    <button class="hdr-btn" id="logout-btn">Logout</button>
    <button class="hdr-btn" id="settings-btn">⚙</button>
  </div>
</header>

<div id="chat"></div>

<div id="input-bar">
  <input type="text" id="msg-input" placeholder="Ask Aion..." autocomplete="off">
  <button id="send-btn">Send</button>
</div>

<!-- Settings overlay -->
<div id="settings">
  <div class="settings-box">
    <h2>Settings</h2>
    <div class="field">
      <label>Aion API URL</label>
      <input type="text" id="api-url-input" placeholder="http://50.173.192.52:41658">
    </div>
    <div class="settings-btns">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn-save" id="save-btn">Save</button>
    </div>
  </div>
</div>

<div id="login">
  <div class="login-box">
    <h2>Sign In</h2>
    <p>Desktop chat now requires an authenticated Aion session.</p>
    <input type="text" id="login-user" placeholder="Username" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
    <button id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<script>
  let apiUrl = 'http://50.173.192.52:41658';
  let ttsEnabled = true;
  let authed = false;

  const chat       = document.getElementById('chat');
  const msgInput   = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const ttsBtn     = document.getElementById('tts-btn');
  const logoutBtn  = document.getElementById('logout-btn');
  const settingsEl = document.getElementById('settings');
  const apiInput   = document.getElementById('api-url-input');
  const statusDot  = document.getElementById('status-dot');
  const userBadge  = document.getElementById('user-badge');
  const loginEl    = document.getElementById('login');
  const loginUser  = document.getElementById('login-user');
  const loginPass  = document.getElementById('login-pass');
  const loginBtn   = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');

  // Load config from electron main process
  async function init() {
    const config = await window.aion.getConfig();
    apiUrl = config.apiUrl || apiUrl;
    apiInput.value = apiUrl;
    await checkAuth();
    checkStatus();
    if (authed) msgInput.focus();
  }

  async function checkStatus() {
    try {
      const r = await fetch(apiUrl + '/api/system/public/health', { signal: AbortSignal.timeout(3000) });
      statusDot.className = r.ok ? 'online' : 'offline';
    } catch {
      statusDot.className = 'offline';
    }
  }

  function setAuthState(username) {
    authed = Boolean(username);
    loginEl.classList.toggle('open', !authed);
    logoutBtn.style.display = authed ? 'inline-block' : 'none';
    userBadge.textContent = authed ? username : '';
    msgInput.disabled = !authed;
    sendBtn.disabled = !authed;
  }

  function showLoginError(message) {
    loginError.textContent = message || '';
    loginError.style.display = message ? 'block' : 'none';
  }

  async function checkAuth() {
    try {
      const res = await fetch(apiUrl + '/api/whoami', {
        credentials: 'include',
        signal: AbortSignal.timeout(5000),
      });
      if (!res.ok) {
        setAuthState('');
        return;
      }
      const data = await res.json();
      setAuthState(data.username || 'user');
      showLoginError('');
    } catch {
      setAuthState('');
      showLoginError('Could not reach Aion API.');
    }
  }

  async function doLogin() {
    const username = loginUser.value.trim();
    const password = loginPass.value;
    if (!username || !password) {
      showLoginError('Enter username and password.');
      return;
    }
    loginBtn.disabled = true;
    showLoginError('');
    try {
      const res = await fetch(apiUrl + '/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username, password }),
        signal: AbortSignal.timeout(10000),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        showLoginError(data.error || 'Login failed.');
        return;
      }
      if (data.requires_password_change) {
        showLoginError('Password must be changed in web UI first.');
        return;
      }
      setAuthState(data.username || username);
      loginPass.value = '';
      msgInput.focus();
    } catch (err) {
      showLoginError('Login error: ' + err.message);
    } finally {
      loginBtn.disabled = false;
    }
  }

  function addMsg(text, type) {
    const d = document.createElement('div');
    d.className = 'msg ' + type;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'msg assistant typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  function playAudio(b64) {
    new Audio('data:audio/mp3;base64,' + b64).play().catch(() => {});
  }

  async function send() {
    const text = msgInput.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    msgInput.value = '';
    sendBtn.disabled = true;
    msgInput.disabled = true;
    const typing = showTyping();

    try {
      const res = await fetch(apiUrl + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ message: text, tts: ttsEnabled }),
        signal: AbortSignal.timeout(120000),
      });
      const data = await res.json();
      typing.remove();

      if (res.status === 401 || (data && data.login_required)) {
        setAuthState('');
        showLoginError('Session expired. Sign in again.');
      } else if (data.error) {
        addMsg('Error: ' + data.error, 'assistant error');
      } else {
        addMsg(data.response, 'assistant');
        if (data.audio) playAudio(data.audio);
      }
      statusDot.className = 'online';
    } catch (err) {
      typing.remove();
      addMsg('Could not reach Aion. Is the server running? (' + err.message + ')', 'assistant error');
      statusDot.className = 'offline';
    }

    sendBtn.disabled = false;
    msgInput.disabled = false;
    msgInput.focus();
  }

  // TTS toggle
  ttsBtn.addEventListener('click', () => {
    ttsEnabled = !ttsEnabled;
    ttsBtn.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
    ttsBtn.classList.toggle('off', !ttsEnabled);
  });

  // Settings
  document.getElementById('settings-btn').addEventListener('click', () => {
    apiInput.value = apiUrl;
    settingsEl.classList.add('open');
  });
  document.getElementById('cancel-btn').addEventListener('click', () => {
    settingsEl.classList.remove('open');
  });
  document.getElementById('save-btn').addEventListener('click', async () => {
    apiUrl = apiInput.value.trim().replace(/\/$/, '');
    await window.aion.saveConfig({ apiUrl });
    settingsEl.classList.remove('open');
    await checkAuth();
    checkStatus();
  });

  logoutBtn.addEventListener('click', async () => {
    try {
      await fetch(apiUrl + '/api/logout', { method: 'POST', credentials: 'include' });
    } catch {}
    setAuthState('');
  });

  loginBtn.addEventListener('click', doLogin);
  loginPass.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
  loginUser.addEventListener('keypress', e => { if (e.key === 'Enter') loginPass.focus(); });

  // Send on Enter
  msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
  sendBtn.addEventListener('click', send);

  init();
  setInterval(checkStatus, 30000);
</script>
</body>
</html>
