<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            position: relative;
        }

        header h1 {
            font-size: 1.5rem;
            color: #00d9ff;
        }

        #tts-toggle {
            background: none;
            border: 2px solid #00d9ff;
            color: #00d9ff;
            padding: 0.4rem 0.75rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.2s;
        }

        #tts-toggle:hover {
            background: #00d9ff22;
        }

        #tts-toggle.off {
            border-color: #666;
            color: #666;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1f4068;
            border-bottom-left-radius: 0.25rem;
        }

        .message.error {
            background: #5c1a1a;
            color: #ff6b6b;
        }

        #input-container {
            padding: 1rem;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 0.5rem;
        }

        #message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 1.5rem;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }

        #message-input:focus {
            border-color: #00d9ff;
        }

        #message-input::placeholder {
            color: #666;
        }

        #send-btn {
            padding: 0.75rem 1.5rem;
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            border-radius: 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #00b8d9;
        }

        #send-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 0.75rem 1rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00d9ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            .message { max-width: 90%; }
        }

        /* Login overlay */
        #login-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a1a2eee;
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        #login-overlay.visible { display: flex; }
        #login-box {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 1rem;
            padding: 2rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #login-box h2 { color: #00d9ff; text-align: center; font-size: 1.4rem; }
        #login-box input {
            padding: 0.75rem 1rem;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 0.5rem;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }
        #login-box input:focus { border-color: #00d9ff; }
        #login-submit {
            padding: 0.75rem;
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #login-submit:hover { background: #00b8d9; }
        #login-error { color: #ff6b6b; font-size: 0.85rem; text-align: center; display: none; }

        /* Header actions */
        .header-actions {
            position: absolute;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        #user-badge {
            position: absolute;
            left: 1rem;
            font-size: 0.8rem;
            color: #00d9ff99;
            display: none;
        }
        #logout-btn {
            background: none;
            border: 1px solid #ff6b6b44;
            color: #ff6b6b;
            padding: 0.4rem 0.75rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: none;
        }
        #logout-btn:hover { background: #ff6b6b22; border-color: #ff6b6b; }
        #mem-btn {
            background: none;
            border: 1px solid #00d9ff44;
            color: #00d9ff;
            padding: 0.4rem 0.75rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        #mem-btn:hover { background: #00d9ff22; border-color: #00d9ff; }

        /* Memory Browser overlay */
        #memory-browser {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            z-index: 200;
            flex-direction: column;
        }
        #memory-browser.open { display: flex; }

        .mem-header {
            background: #16213e;
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }
        .mem-header h2 { color: #00d9ff; font-size: 1rem; white-space: nowrap; }
        #mem-search {
            flex: 1;
            padding: 0.45rem 0.9rem;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 1rem;
            color: #eee;
            font-size: 0.9rem;
            outline: none;
        }
        #mem-search:focus { border-color: #00d9ff; }
        #mem-search::placeholder { color: #555; }
        .mem-close-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            padding: 0 0.25rem;
        }
        .mem-close-btn:hover { color: #fff; }

        .mem-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Category accordion */
        .mem-category { border: 1px solid #0f3460; border-radius: 0.75rem; overflow: hidden; }
        .mem-cat-header {
            padding: 0.7rem 1rem;
            background: #16213e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            user-select: none;
        }
        .mem-cat-header:hover { background: #1e3050; }
        .mem-chevron { color: #00d9ff; font-size: 0.75rem; transition: transform 0.2s; }
        .mem-cat-header.open .mem-chevron { transform: rotate(90deg); }
        .mem-cat-title { flex: 1; font-weight: 600; color: #eee; font-size: 0.95rem; }
        .mem-cat-count { font-size: 0.78rem; color: #666; }

        .mem-convs {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.28s ease-out;
            background: #131e30;
        }
        .mem-convs.open { max-height: 4000px; transition: max-height 0.4s ease-in; }

        /* Conversation row */
        .mem-conv {
            padding: 0.55rem 1rem 0.55rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid #0f346022;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .mem-conv:last-of-type { border-bottom: none; }
        .mem-conv:hover { background: #16213e; }
        .mem-conv.active { background: #0f3060; }
        .mem-conv-name { font-size: 0.9rem; color: #ddd; }
        .mem-conv-meta { font-size: 0.75rem; color: #777; display: flex; gap: 1rem; }

        /* Expanded messages */
        .mem-messages-wrap {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            background: #0d1929;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .mem-messages-wrap.open {
            max-height: 55vh;
            overflow-y: auto;
            padding: 0.75rem 1rem 0.75rem 1.5rem;
            border-top: 1px solid #0f3460;
            border-bottom: 1px solid #0f3460;
        }
        .mem-loading-msg { color: #888; font-size: 0.85rem; text-align: center; padding: 0.5rem; }

        /* Chat bubbles */
        .mem-bubble-row { display: flex; }
        .mem-bubble-row.jenn { justify-content: flex-end; }
        .mem-bubble-row.other { justify-content: flex-start; }
        .mem-bubble-col { display: flex; flex-direction: column; max-width: 75%; }
        .mem-bubble-row.jenn .mem-bubble-col { align-items: flex-end; }
        .mem-bubble {
            padding: 0.45rem 0.7rem;
            border-radius: 0.75rem;
            font-size: 0.84rem;
            line-height: 1.45;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .mem-bubble-row.jenn .mem-bubble {
            background: #0f3460;
            border-bottom-right-radius: 0.15rem;
        }
        .mem-bubble-row.other .mem-bubble {
            background: #1f4068;
            border-bottom-left-radius: 0.15rem;
        }
        .mem-bubble.post-death { border: 1px solid #884444; opacity: 0.85; }
        .mem-bubble-meta {
            font-size: 0.68rem;
            color: #666;
            margin-top: 0.15rem;
            padding: 0 0.2rem;
        }
    </style>
</head>
<body>
    <!-- Login overlay -->
    <div id="login-overlay" class="visible">
        <div id="login-box">
            <h2>JARVIS</h2>
            <input type="text" id="login-username" placeholder="Username" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button id="login-submit">Sign In</button>
            <div id="login-error"></div>
        </div>
    </div>

    <header>
        <span id="user-badge"></span>
        <h1>JARVIS</h1>
        <div class="header-actions">
            <button id="logout-btn" title="Sign out">Logout</button>
            <button id="mem-btn" title="Browse Memory">Memory</button>
            <button id="tts-toggle" title="Toggle Text-to-Speech">TTS ON</button>
        </div>
    </header>

    <div id="chat-container"></div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <!-- Memory Browser overlay -->
    <div id="memory-browser">
        <div class="mem-header">
            <h2>Memory Browser</h2>
            <input type="text" id="mem-search" placeholder="Search conversations...">
            <button class="mem-close-btn" id="mem-close">×</button>
        </div>
        <div class="mem-body" id="mem-body">
            <div class="mem-loading-msg">Loading...</div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const ttsToggle = document.getElementById('tts-toggle');

        let ttsEnabled = true;

        // ── Auth ─────────────────────────────────────────────────────────
        const loginOverlay  = document.getElementById('login-overlay');
        const loginUsername = document.getElementById('login-username');
        const loginPassword = document.getElementById('login-password');
        const loginSubmit   = document.getElementById('login-submit');
        const loginError    = document.getElementById('login-error');
        const userBadge     = document.getElementById('user-badge');
        const logoutBtn     = document.getElementById('logout-btn');

        async function checkAuth() {
            try {
                const r = await fetch('/api/whoami', { credentials: 'include' });
                if (r.ok) {
                    const data = await r.json();
                    onLoginSuccess(data.username);
                } else {
                    loginOverlay.classList.add('visible');
                    loginUsername.focus();
                }
            } catch (e) {
                loginOverlay.classList.add('visible');
                loginUsername.focus();
            }
        }

        async function doLogin() {
            const username = loginUsername.value.trim();
            const password = loginPassword.value;
            loginError.style.display = 'none';
            if (!username || !password) {
                showLoginError('Please enter username and password.');
                return;
            }
            loginSubmit.disabled = true;
            try {
                const r = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password }),
                });
                const data = await r.json();
                if (r.ok) {
                    onLoginSuccess(data.username);
                } else {
                    showLoginError(data.error || 'Login failed.');
                }
            } catch (e) {
                showLoginError('Network error. Try again.');
            }
            loginSubmit.disabled = false;
        }

        function showLoginError(msg) {
            loginError.textContent = msg;
            loginError.style.display = 'block';
        }

        function onLoginSuccess(username) {
            loginOverlay.classList.remove('visible');
            loginPassword.value = '';
            userBadge.textContent = username;
            userBadge.style.display = 'block';
            logoutBtn.style.display = 'block';
            messageInput.focus();
        }

        logoutBtn.addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            location.reload();
        });

        loginSubmit.addEventListener('click', doLogin);
        loginPassword.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
        loginUsername.addEventListener('keypress', e => { if (e.key === 'Enter') loginPassword.focus(); });

        // Check auth on page load
        checkAuth();

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msg;
        }

        function showTyping() {
            const indicator = document.createElement('div');
            indicator.className = 'message assistant typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(indicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return indicator;
        }

        function playAudio(base64Audio) {
            const audio = new Audio('data:audio/mp3;base64,' + base64Audio);
            audio.play().catch(err => console.warn('Audio playback failed:', err));
        }

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
            ttsToggle.classList.toggle('off', !ttsEnabled);
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;
            messageInput.disabled = true;

            const typing = showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ message: text, tts: ttsEnabled })
                });

                const data = await response.json();
                typing.remove();

                if (response.status === 401) {
                    loginOverlay.classList.add('visible');
                    loginUsername.focus();
                } else if (data.error) {
                    addMessage(`Error: ${data.error}`, 'assistant error');
                } else {
                    addMessage(data.response, 'assistant');
                    if (data.audio) {
                        playAudio(data.audio);
                    }
                }
            } catch (err) {
                typing.remove();
                addMessage(`Error: ${err.message}`, 'assistant error');
            }

            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }

        ttsToggle.addEventListener('click', toggleTTS);
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        messageInput.focus();

        // ── Memory Browser ────────────────────────────────────────────
        const memBrowser  = document.getElementById('memory-browser');
        const memBody     = document.getElementById('mem-body');
        const memSearch   = document.getElementById('mem-search');
        const memBtn      = document.getElementById('mem-btn');
        const memCloseBtn = document.getElementById('mem-close');

        let memData = null;
        let activeConvEl = null;

        const CAT_ORDER = [
            'Birth & Pregnancy', 'Love & Relationships', 'Family & Parenting',
            'Health & Wellbeing', 'Loss & Grief', 'Major Life Events', 'General'
        ];
        const JENN_NAMES = new Set([
            'jennifer frotten', 'jennifer wallace', 'jennifer frotten wallace', 'jennifer'
        ]);

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function fmtDate(ts) {
            if (!ts) return '';
            return new Date(ts).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        }

        memBtn.addEventListener('click', async () => {
            memBrowser.classList.add('open');
            if (!memData) await loadMemData();
        });

        memCloseBtn.addEventListener('click', () => memBrowser.classList.remove('open'));

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && memBrowser.classList.contains('open'))
                memBrowser.classList.remove('open');
        });

        async function loadMemData() {
            memBody.innerHTML = '<div class="mem-loading-msg">Loading conversations…</div>';
            try {
                const r = await fetch('/api/memory/browse');
                const data = await r.json();
                memData = data.categories || {};
                renderCategories(memData);
            } catch(e) {
                memBody.innerHTML = `<div class="mem-loading-msg">Error: ${escHtml(e.message)}</div>`;
            }
        }

        function renderCategories(cats) {
            memBody.innerHTML = '';
            const order = [...CAT_ORDER.filter(c => cats[c]), ...Object.keys(cats).filter(c => !CAT_ORDER.includes(c))];

            for (const catName of order) {
                const convs = cats[catName];
                if (!convs || !convs.length) continue;

                const catEl = document.createElement('div');
                catEl.className = 'mem-category';

                const hdr = document.createElement('div');
                hdr.className = 'mem-cat-header';
                hdr.innerHTML = `
                    <span class="mem-chevron">▶</span>
                    <span class="mem-cat-title">${escHtml(catName)}</span>
                    <span class="mem-cat-count">${convs.length} conversation${convs.length !== 1 ? 's' : ''}</span>`;

                const convsEl = document.createElement('div');
                convsEl.className = 'mem-convs';

                for (const conv of convs) {
                    const convEl = document.createElement('div');
                    convEl.className = 'mem-conv';
                    convEl.dataset.name = (conv.display || '').toLowerCase();

                    const d1 = fmtDate(conv.ts_start), d2 = fmtDate(conv.ts_end);
                    const dateRange = d1 === d2 ? d1 : `${d1} – ${d2}`;

                    convEl.innerHTML = `
                        <div class="mem-conv-name">${escHtml(conv.display || conv.thread_id)}</div>
                        <div class="mem-conv-meta">
                            <span>${escHtml(dateRange)}</span>
                            <span>${conv.msg_count} msg${conv.msg_count !== 1 ? 's' : ''}</span>
                        </div>`;

                    const msgsWrap = document.createElement('div');
                    msgsWrap.className = 'mem-messages-wrap';

                    convEl.addEventListener('click', () => toggleConversation(convEl, msgsWrap, conv.thread_id));

                    convsEl.appendChild(convEl);
                    convsEl.appendChild(msgsWrap);
                }

                hdr.addEventListener('click', () => {
                    hdr.classList.toggle('open');
                    convsEl.classList.toggle('open');
                });

                catEl.appendChild(hdr);
                catEl.appendChild(convsEl);
                memBody.appendChild(catEl);
            }
        }

        async function toggleConversation(convEl, msgsWrap, threadId) {
            if (msgsWrap.classList.contains('open')) {
                msgsWrap.classList.remove('open');
                convEl.classList.remove('active');
                return;
            }

            // Close previously open
            if (activeConvEl) activeConvEl.classList.remove('active');
            document.querySelectorAll('.mem-messages-wrap.open').forEach(el => el.classList.remove('open'));

            convEl.classList.add('active');
            activeConvEl = convEl;
            msgsWrap.classList.add('open');

            if (!msgsWrap.dataset.loaded) {
                msgsWrap.innerHTML = '<div class="mem-loading-msg">Loading messages…</div>';
                try {
                    const r = await fetch(`/api/memory/thread/${encodeURIComponent(threadId)}`);
                    const data = await r.json();
                    msgsWrap.innerHTML = '';
                    if (data.error) {
                        msgsWrap.innerHTML = `<div class="mem-loading-msg">${escHtml(data.error)}</div>`;
                    } else {
                        renderMessages(msgsWrap, data.messages);
                        msgsWrap.dataset.loaded = '1';
                    }
                } catch(e) {
                    msgsWrap.innerHTML = `<div class="mem-loading-msg">Error: ${escHtml(e.message)}</div>`;
                }
            }

            msgsWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function renderMessages(container, messages) {
            if (!messages || !messages.length) {
                container.innerHTML = '<div class="mem-loading-msg">No messages found.</div>';
                return;
            }
            for (const msg of messages) {
                const isJenn = JENN_NAMES.has(msg.sender.toLowerCase());
                const row = document.createElement('div');
                row.className = `mem-bubble-row ${isJenn ? 'jenn' : 'other'}`;

                const col = document.createElement('div');
                col.className = 'mem-bubble-col';

                const bubble = document.createElement('div');
                bubble.className = `mem-bubble${msg.post_death ? ' post-death' : ''}`;
                bubble.textContent = msg.content;

                const meta = document.createElement('div');
                meta.className = 'mem-bubble-meta';
                meta.textContent = `${msg.sender} · ${msg.timestamp}${msg.note ? ' · ' + msg.note : ''}`;

                col.appendChild(bubble);
                col.appendChild(meta);
                row.appendChild(col);
                container.appendChild(row);
            }
        }

        // Search: filter conversation rows by name
        memSearch.addEventListener('input', () => {
            const q = memSearch.value.toLowerCase().trim();
            document.querySelectorAll('.mem-conv').forEach(el => {
                const match = !q || el.dataset.name.includes(q);
                el.style.display = match ? '' : 'none';
                // Also hide the messages wrap for hidden convs
                const wrap = el.nextElementSibling;
                if (wrap && wrap.classList.contains('mem-messages-wrap') && !match) {
                    wrap.style.display = 'none';
                } else if (wrap && wrap.classList.contains('mem-messages-wrap') && match) {
                    wrap.style.display = '';
                }
            });
        });
    </script>
