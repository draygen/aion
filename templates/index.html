<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            position: relative;
        }

        header h1 {
            font-size: 1.5rem;
            color: #00d9ff;
        }

        #tts-toggle {
            position: absolute;
            right: 1rem;
            background: none;
            border: 2px solid #00d9ff;
            color: #00d9ff;
            padding: 0.4rem 0.75rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        #tts-toggle:hover {
            background: #00d9ff22;
        }

        #tts-toggle.off {
            border-color: #666;
            color: #666;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1f4068;
            border-bottom-left-radius: 0.25rem;
        }

        .message.error {
            background: #5c1a1a;
            color: #ff6b6b;
        }

        #input-container {
            padding: 1rem;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 0.5rem;
        }

        #message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 1.5rem;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }

        #message-input:focus {
            border-color: #00d9ff;
        }

        #message-input::placeholder {
            color: #666;
        }

        #send-btn {
            padding: 0.75rem 1.5rem;
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            border-radius: 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #00b8d9;
        }

        #send-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 0.75rem 1rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00d9ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>JARVIS</h1>
        <button id="tts-toggle" title="Toggle Text-to-Speech">TTS ON</button>
    </header>

    <div id="chat-container"></div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const ttsToggle = document.getElementById('tts-toggle');

        let ttsEnabled = true;

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msg;
        }

        function showTyping() {
            const indicator = document.createElement('div');
            indicator.className = 'message assistant typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(indicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return indicator;
        }

        function playAudio(base64Audio) {
            const audio = new Audio('data:audio/mp3;base64,' + base64Audio);
            audio.play().catch(err => console.warn('Audio playback failed:', err));
        }

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            ttsToggle.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
            ttsToggle.classList.toggle('off', !ttsEnabled);
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;
            messageInput.disabled = true;

            const typing = showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, tts: ttsEnabled })
                });

                const data = await response.json();
                typing.remove();

                if (data.error) {
                    addMessage(`Error: ${data.error}`, 'assistant error');
                } else {
                    addMessage(data.response, 'assistant');
                    if (data.audio) {
                        playAudio(data.audio);
                    }
                }
            } catch (err) {
                typing.remove();
                addMessage(`Error: ${err.message}`, 'assistant error');
            }

            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }

        ttsToggle.addEventListener('click', toggleTTS);
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        messageInput.focus();
    </script>
</body>
</html>
